services:
  - type: web
    name: food-database-api
    runtime: node
    plan: free
    buildCommand: 'node -e "console.log('"'"'No build step required'"'"')"'
    startCommand: "node src/server.js"
    envVars:
      - key: PORT
        value: "3000"
      - key: DATABASE_PATH
        value: "/tmp/food-database.sqlite"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "60"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
